repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: \.env.*|secrets/|\.venv/|node_modules/|data/
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        args: ["--redact"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: validate-migrations
        name: Validate Alembic Migrations
        entry: python scripts/validate_migrations.py
        language: python
        files: ^migrations/versions/.*\.py$
        pass_filenames: false
        always_run: true
      - id: no-raw-truncate
        name: No raw TRUNCATE in tests
        entry: bash scripts/check_no_raw_truncate.sh
        language: system
        files: ^tests/.*\.py$
        pass_filenames: false
      - id: enterprise-guard
        name: No enterprise references in OSS
        entry: python scripts/check_enterprise_guard.py
        language: python
        files: ^amprealize/.*\.py$
        pass_filenames: false
